<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder Games</title>
    <link rel="stylesheet" href="style.css">
</head>

<script>

window.onload = function() {

    let user = sessionStorage.getItem("loggedUser");

    let loginButton = document.getElementById("loginBtn");

    if(user != null) {

        loginButton.innerHTML = sessionStorage.getItem("loggedUser") +'<br>'+'Bal: '+sessionStorage.getItem("AccountBalance");
        document.getElementById("accountBtn").style.display = "inline-block";
    }
    else {

        loginButton.innerHTML = "Login";

    }

}

</script>




<body>

    <!-- Top Right Buttons -->
    <div class="top-buttons">
        <button id="loginBtn" onclick="location.href='login.html'">
    Login
</button>
        <button id="signupLogoutBtn">Sign Up</button>

        <button id="accountBtn"
        onclick="location.href='account.html'"
        style="display:none;">
         Account
        </button>

    </div>

    <!-- Headings -->
    <div class="headings">
        <h1>Welcome to Wonder Games</h1>
        <h2>Play Fun Online Games</h2>
        <h3>Enjoy and Challenge Yourself</h3>
    </div>

    <!-- Game Buttons -->
    <div class="games-container">

        <button onclick="location.href='game1.html'">Game 1</button>
        <button onclick="location.href='game2.html'">Game 2</button>
        <button onclick="location.href='game3.html'">Game 3</button>
        <button onclick="location.href='game4.html'">Game 4</button>
        <button onclick="location.href='game5.html'">Game 5</button>
        <button onclick="location.href='game6.html'">Game 6</button>
        <button onclick="location.href='game7.html'">Game 7</button>
        <button onclick="location.href='game8.html'">Game 8</button>
        <button onclick="location.href='game9.html'">Game 9</button>
        <button onclick="location.href='game10.html'">Game 10</button>

    </div>


<script>

  const btn = document.getElementById("signupLogoutBtn");

if (sessionStorage.getItem("isLoggedIn") === "true") {

    btn.textContent = "Log Out";

    btn.onclick = function () {

       const result = confirm("Are you sure you want to log out?");

      if (!result) {
        return;
      }

        sessionStorage.clear();

        window.location.href = "index.html";
    };

} else {

    btn.textContent = "Sign Up";

    btn.onclick = function () {

        window.location.href = "signup.html";
    };
}

</script>

    
</body>

</html>
